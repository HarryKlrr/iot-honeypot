# ============================================================================
# Cowrie configuration — IoT Honeypot & Threat Analysis project
#
# This file contains only the settings OVERRIDDEN from Cowrie's defaults
# (etc/cowrie.cfg.dist). Anything not listed here uses the upstream default.
# Sanitised for public release: no keys, tokens, or host-identifying addresses.
# ============================================================================

[honeypot]
# Present the sensor as a low-end IoT/embedded device
hostname = iot_device

# Structured JSON telemetry + full TTY session transcripts
log_path = var/log/cowrie
ttylog = true
timezone = UTC

# Authentication policy lives in etc/userdb.txt (see config/userdb.txt)
auth_class = UserDB

# ============================================================================
# SSH — exposed on 2222 (iptables redirects 22 -> 2222)
# ============================================================================
[ssh]
enabled = true
listen_endpoints = tcp:2222:interface=0.0.0.0
# Dated banner to reinforce the "old, unpatched IoT device" persona
version = SSH-2.0-OpenSSH_6.0p1 Debian-4+deb7u2

# ============================================================================
# Telnet — exposed on 2223 (iptables redirects 23 -> 2223)
# A primary IoT-botnet (Mirai) infection vector
# ============================================================================
[telnet]
enabled = true
listen_endpoints = tcp:2223:interface=0.0.0.0

# ============================================================================
# Output — JSON log used by the analysis pipeline
# ============================================================================
[output_jsonlog]
enabled = true
logfile = ${honeypot:log_path}/cowrie.json
epoch_timestamp = false
